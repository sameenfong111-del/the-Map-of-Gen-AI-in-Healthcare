                    <div id="frameworks-list">${frameworks || 'N/A'}</div>
                </div>
                
                <div class="regulatory-layers">
                    ${layersHtml}
                </div>
                
                <div class="update-time">
                    ⏰ 最后更新：${countryData.lastUpdated || countryData.update_date || 'N/A'}
                </div>
            `;

            document.getElementById('sidebarContent').innerHTML = html;
        }

        // ============================================
        // 4. 初始化地图
        // ============================================
        function initMapWithData() {
            if (!map) {
                map = L.map('map').setView([20, 0], 2);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap contributors © CARTO',
                    maxZoom: 19,
                    subdomains: 'abcd'
                }).addTo(map);
            }

            markersLayer.clearLayers();

            countryPolicyData.forEach((country) => {
                const countryName = country.country || country.countryCode || '';
                const coords = countryCoordinates[countryName] || 
                              countryCoordinates[country.countryCode] || 
                              null;

                if (!coords) {
                    console.warn(`⚠ 找不到坐标: ${countryName}`);
                    return;
                }

                const severity = country.severity || country.severityCN || "Moderate";
                const color = severityColors[severity] || "#f59e0b";

                const circle = L.circleMarker(coords, {
                    radius: 12,
                    fillColor: color,
                    color: color,
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.7
                }).addTo(markersLayer);

                const popupContent = `
                    <div class="info-popup">
                        <div class="info-popup-title">${countryName}</div>
                        <div class="info-popup-content">
                            <strong>等级：</strong>${country.severityCN || country.severity}<br>
                            <strong>法案：</strong>${(country.mainLaws || '').substring(0, 40)}...
                        </div>
                    </div>
                `;
                circle.bindPopup(popupContent, { maxWidth: 250 });

                circle.on('click', () => {
                    updateSidebar(country);
                });
            });

            markersLayer.addTo(map);
            addLegend();

            console.log(`✓ 地图已初始化，共有 ${countryPolicyData.length} 个国家`);
        }

        // ============================================
        // 5. 添加图例
        // ============================================
        function addLegend() {
            const legend = L.control({ position: 'bottomright' });
            
            legend.onAdd = function() {
                const div = L.DomUtil.create('div', 'bg-white p-3 rounded-lg shadow-lg text-sm');
                div.innerHTML = `
                    <div style="font-weight: 700; margin-bottom: 8px;">监管等级</div>
                    <div style="display: flex; align-items: center; margin-bottom: 6px;">
                        <span style="display: inline-block; width: 12px; height: 12px; background: #dc2626; border-radius: 50%; margin-right: 8px;"></span>
                        <span>严格 (Strict)</span>
                    </div>
                    <div style="display: flex; align-items: center; margin-bottom: 6px;">
                        <span style="display: inline-block; width: 12px; height: 12px; background: #f59e0b; border-radius: 50%; margin-right: 8px;"></span>
                        <span>温和 (Moderate)</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span style="display: inline-block; width: 12px; height: 12px; background: #10b981; border-radius: 50%; margin-right: 8px;"></span>
                        <span>宽松 (Light)</span>
                    </div>
                `;
                return div;
            };
            
            legend.addTo(map);
        }

        // ============================================
        // 6. 加载指示器
        // ============================================
        function showLoading(show) {
            const indicator = document.getElementById('loadingIndicator');
            if (show) {
                indicator.classList.add('show');
            } else {
                indicator.classList.remove('show');
            }
        }

        // ============================================
        // 7. 页面加载时执行
        // ============================================
        window.addEventListener('load', loadPolicyData);

        // 外部 API
        window.updatePolicyData = function(newData) {
            countryPolicyData = newData;
            console.log("✓ 数据已更新，重新初始化地图");
            initMapWithData();
        };

        window.getPolicyData = function() {
            return countryPolicyData;
        };
    </script>
</body>
</html>

        // ============================================
        // 3. 初始化地图并渲染数据
        // ============================================
        function initMapWithData() {
            // 初始化地图
            if (!map) {
                map = L.map('map').setView([20, 0], 2);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap contributors © CARTO',
                    maxZoom: 19,
                    subdomains: 'abcd'
                }).addTo(map);
            }

            // 清空之前的标记
            markersLayer.clearLayers();

            // 为每个国家添加标记
            countryPolicyData.forEach((country) => {
                const countryName = country.country || country.countryCode || '';
                const coords = countryCoordinates[countryName] || 
                              countryCoordinates[country.countryCode] || 
                              null;

                if (!coords) {
                    console.warn(`⚠ 找不到坐标: ${countryName} (${country.countryCode})`);
                    return;
                }

                const severity = country.severity || country.severityCN || "Moderate";
                const color = severityColors[severity] || "#f59e0b";

                // 创建圆形标记
                const circle = L.circleMarker(coords, {
                    radius: 12,
                    fillColor: color,
                    color: color,
                    weight: 2,
                    opacity: 0.8,
                    fillOpacity: 0.7
                }).addTo(markersLayer);

                // 弹出框内容
                const popupContent = `
                    <div class="info-popup">
                        <div class="info-popup-title">${countryName}</div>
                        <div class="info-popup-content">
                            <strong>等级：</strong>${country.severityCN || country.severity}<br>
                            <strong>法案：</strong>${(country.mainLaws || '').substring(0, 40)}...<br>
                            <a href="#" onclick="return false;" style="color: #667eea;">点击地图查看详情</a>
                        </div>
                    </div>
                `;
                circle.bindPopup(popupContent, { maxWidth: 250 });

                // 点击事件：渲染侧边栏
                circle.on('click', () => {
                    renderSidebarContent(country);
                });
            });

            markersLayer.addTo(map);

            // 添加图例
            addLegend();

            console.log(`✓ 地图已初始化，共有 ${countryPolicyData.length} 个国家`);
        }

            const severity = country.severity || country.severityCN || "Moderate";

            // 技术合规义务

                        <span class="eco-legal-item-check">${item.status ? '✓' : '○'}</span>
                        <span class="eco-legal-item-text">${item.requirement}</span>
                    </div>
                `).join('');

            // 系统性风险治理

                .map(item => `

                        <span class="eco-legal-item-check">${item.status ? '✓' : '○'}</span>
                        <span class="eco-legal-item-text">${item.requirement}</span>
                    </div>
                `).join('');

            const html = `
                <div class="country-title">${countryName}</div>
                <div class="severity-badge ${severityClass}">
                    📊 监管等级：${severity}
                </div>
                
                <div class="info-section">
                    <div class="info-section-title">📜 核心法案</div>
                    <div class="info-section-content">${country.mainLaws || 'N/A'}</div>
                </div>
                
                <div class="info-section">
                    <div class="info-section-title">🎯 核心规制焦点</div>
                    <div class="info-section-content">${country.coreRegulation || 'N/A'}</div>
                </div>
                
                ${technicalHtml ? `
                <div class="eco-legal-card">
                    <div class="eco-legal-title">
                        <span class="eco-legal-icon">⚙️</span>
                        技术合规义务 (Technical Compliance)
                    </div>
                    <div class="eco-legal-items">
                        ${technicalHtml}
                    </div>
                </div>
                ` : ''}
                
                ${systemicHtml ? `
                <div class="eco-legal-card">
                    <div class="eco-legal-title">
                        <span class="eco-legal-icon">🛡️</span>
                        系统性风险治理 (Systemic Risk Governance)
                    </div>
                    <div class="eco-legal-items">
                        ${systemicHtml}
                    </div>
                </div>
                ` : ''}
                
                ${country.lastUpdated ? `
                <div class="update-time">
                    ⏰ 最后更新：${country.lastUpdated}
                </div>
                ` : ''}
            `;

            document.getElementById('sidebarContent').innerHTML = html;
        }

        // ============================================
        // 5. 添加图例
        // ============================================
        function addLegend() {
            const legend = L.control({ position: 'bottomright' });
            
            legend.onAdd = function() {
                const div = L.DomUtil.create('div', 'bg-white p-3 rounded-lg shadow-lg text-sm');
                div.innerHTML = `
                    <div style="font-weight: 700; margin-bottom: 8px;">监管等级</div>
                    <div style="display: flex; align-items: center; margin-bottom: 6px;">
                        <span style="display: inline-block; width: 12px; height: 12px; background: #dc2626; border-radius: 50%; margin-right: 8px;"></span>
                        <span>严格 (Strict)</span>
                    </div>
                    <div style="display: flex; align-items: center; margin-bottom: 6px;">
                        <span style="display: inline-block; width: 12px; height: 12px; background: #f59e0b; border-radius: 50%; margin-right: 8px;"></span>
                        <span>温和 (Moderate)</span>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <span style="display: inline-block; width: 12px; height: 12px; background: #10b981; border-radius: 50%; margin-right: 8px;"></span>
                        <span>宽松 (Light)</span>
                    </div>
                `;
                return div;
            };
            
            legend.addTo(map);
        }

        // ============================================
        // 6. 加载指示器控制
        // ============================================
        function showLoading(show) {
            const indicator = document.getElementById('loadingIndicator');
            if (show) {
                indicator.classList.add('show');
            } else {
                indicator.classList.remove('show');
            }
        }

        // ============================================
        // 7. 页面加载时执行
        // ============================================
        window.addEventListener('load', loadPolicyData);

        // 用于外部调用的 API（可选）
        window.updatePolicyData = function(newData) {
            countryPolicyData = newData;
            console.log("✓ 数据已更新，重新初始化地图");
            initMapWithData();
        };

        window.getPolicyData = function() {
            return countryPolicyData;
        };
    </script>
</body>
</html>

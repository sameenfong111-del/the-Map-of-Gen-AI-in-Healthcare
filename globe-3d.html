<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gen AI & Planetary Health - 3D Globe Monitor</title>
    <script src="https://unpkg.com/three@r128/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #040408;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        #globe-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
        }
        .control-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        .title { 
            color: #ffffff; 
            font-weight: 700; 
            font-size: 14px; 
            letter-spacing: 2px; 
        }
        .legend { 
            display: flex; 
            gap: 20px; 
            font-size: 12px; 
            color: #8e92a0; 
        }
        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
        }
        .glow-dot { 
            width: 8px; 
            height: 8px; 
            border-radius: 50%; 
            display: inline-block; 
        }
        .status-indicator {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.8);
            color: #10b981;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 11px;
            z-index: 100;
            font-family: monospace;
        }
        .error-box {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(239, 68, 68, 0.9);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
            display: none;
            max-width: 300px;
        }
    </style>
</head>
<body>

<div id="globe-container"></div>

<div class="status-indicator" id="status">
    ⏳ Initializing 3D Globe...
</div>

<div class="error-box" id="error-box"></div>

<div class="control-panel">
    <div class="title">REGULATORY KNOWLEDGE PLANET</div>
    <div class="legend">
        <div class="legend-item">
            <span class="glow-dot" style="background: #ff3b30; box-shadow: 0 0 10px #ff3b30;"></span> 
            High Accountability Gap
        </div>
        <div class="legend-item">
            <span class="glow-dot" style="background: #ffcc00; box-shadow: 0 0 10px #ffcc00;"></span> 
            Evolving Compliance
        </div>
        <div class="legend-item">
            <span class="glow-dot" style="background: #00e5ff; box-shadow: 0 0 10px #00e5ff;"></span> 
            Active Risk Mitigation Nodes
        </div>
    </div>
</div>

<script>
    function updateStatus(msg, isError = false) {
        const status = document.getElementById('status');
        status.innerText = msg;
        if (isError) {
            status.style.color = '#ef4444';
            status.style.background = 'rgba(127, 29, 29, 0.9)';
        }
    }

    function showError(msg) {
        console.error('❌', msg);
        const errorBox = document.getElementById('error-box');
        errorBox.innerText = msg;
        errorBox.style.display = 'block';
        setTimeout(() => { errorBox.style.display = 'none'; }, 6000);
    }

    try {
        // Initialize 3D Globe
        updateStatus('🌍 Creating 3D Globe...');
        
        const world = Globe()
            (document.getElementById('globe-container'))
            .showAtmosphere(true)
            .atmosphereColor('#00e5ff')
            .atmosphereDaylightAlpha(0.1)
            .globeColor('#0a0a16')
            .pointLat('lat')
            .pointLng('lng')
            .pointColor('color')
            .pointAltitude('altitude')
            .pointRadius('radius')
            .pointsMerge(false)
            .pointLabel(d => `
                <div style="background:rgba(0,0,0,0.85); padding:10px; border:1px solid ${d.color}; border-radius:6px; color:#fff; font-size:12px; max-width:220px;">
                    <strong style="color:${d.color};">${d.name}</strong><br/>
                    <small>${d.status || 'Active Node'}</small>
                </div>
            `);

        // Auto-rotation
        const controls = world.controls();
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableZoom = true;

        console.log('✅ Globe instance created');
        updateStatus('📡 Loading governance data...');

        // Load data
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return res.json();
            })
            .then(data => {
                if (!Array.isArray(data) || data.length === 0) {
                    throw new Error('Invalid data format or empty dataset');
                }
                
                const formattedData = data.map(item => ({
                    lat: item.lat,
                    lng: item.lng,
                    name: item.location_name,
                    status: item.latest_status,
                    color: item.color || '#00e5ff',
                    radius: 0.3,
                    altitude: 0.03 + Math.random() * 0.04
                }));
                
                world.pointsData(formattedData);
                console.log(`✅ Loaded ${formattedData.length} research nodes`);
                updateStatus(`✨ Active: ${formattedData.length} governance nodes`);
            })
            .catch(error => {
                console.error('Data loading error:', error);
                showError(`Data Error: ${error.message}`);
                updateStatus('⚠️ Globe loaded (no data)', true);
            });

    } catch (error) {
        console.error('Fatal error:', error);
        showError(`Initialization Error: ${error.message}`);
        updateStatus('❌ Globe initialization failed', true);
    }
</script>

</body>
</html>
